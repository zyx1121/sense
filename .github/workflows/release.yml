name: release

# tag v* 觸發：build → Developer ID 簽 → notarize → staple → DMG → GitHub Release。
# 簽名私鑰與 notary 憑證走 repo secret。
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-26   # 對齊 ci.yml：SpeechAnalyzer / FoundationModels 需 macOS 26
    permissions:
      contents: write          # gh release 需要寫 release
    steps:
      - uses: actions/checkout@v4

      # Developer ID Application cert（.p12 base64 進 secret）匯入暫時 keychain。
      - name: Import signing certificate
        env:
          DEV_ID_CERT_P12: ${{ secrets.DEV_ID_CERT_P12 }}
          DEV_ID_CERT_PASSWORD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$DEV_ID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$DEV_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      # App Store Connect API key（.p8 base64 進 secret）→ notarytool keychain profile。
      - name: Store notary credentials
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          echo "$AC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials ci-notary \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      # Makefile 的 release target 全 CI 共用 —— 只是把 DEV_ID_APP / NOTARY_PROFILE override 進去。
      - name: Build, sign, notarize, staple, dmg
        env:
          DEV_ID_APP: ${{ secrets.DEV_ID_APP }}
        run: make release DEV_ID_APP="$DEV_ID_APP" NOTARY_PROFILE=ci-notary

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" build/*.dmg --generate-notes
