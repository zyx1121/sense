name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26   # SpeechAnalyzer / FoundationModels 需 macOS 26（2026-02 GA）
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build -c release
